services:
  neo4j:
    image: neo4j:5.26-community
    environment:
      NEO4J_AUTH: neo4j/development-only
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p development-only 'RETURN 1' >/dev/null 2>&1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s
    volumes:
      - neo4j-data:/data

volumes:
  neo4j-data:
